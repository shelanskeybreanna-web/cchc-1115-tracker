<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CCHC 1115 Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#071326;
  color:white;
}
header{
  background:#0f1f3a;
  padding:15px;
  font-size:20px;
  text-align:center;
  font-weight:bold;
}
.container{ padding:20px; }
.hidden{ display:none; }
.card{
  background:#0f1f3a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
button{
  padding:8px;
  border-radius:10px;
  border:none;
  background:#1e6fd9;
  color:white;
  cursor:pointer;
}
.tabSection{ display:none; }
.tabSection.active{ display:block; }

#clientTable th,#clientTable td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<header>CCHC 1115 Waiver Performance Tracker</header>

<div class="container">

<div id="loginSection" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="appSection" class="hidden">

<div style="margin-bottom:20px;">
  <button onclick="showTab('dashboardTab')">Dashboard</button>
  <button onclick="showTab('entryTab')">Client Entry</button>
  <button onclick="showTab('listTab')">Client List</button>
</div>


<div class="card">
  <button onclick="logout()">Logout</button>
  <h3 id="roleDisplay"></h3>
</div>

<div id="dashboardTab" class="tabSection">
  <div class="card">
    <h3>Dashboard</h3>
    <canvas id="navChart"></canvas>
  </div>
</div>
<div id="entryTab" class="tabSection">
  <div class="card">
    <h3>Client Entry</h3>

    <label>Client Name</label><br>
    <input id="clientName" style="width:100%;padding:8px;"><br><br>

    <label>Status</label><br>
    <select id="status" style="width:100%;padding:8px;">
      <option>Open</option>
      <option>Closed</option>
    </select><br><br>

    <label>Navigator</label><br>
    <select id="navigator" style="width:100%;padding:8px;">
      <option>Breanna Shelanskey</option>
      <option>Kylie Miles</option>
      <option>Alexandra Dieffenbacher</option>
      <option>Laurie Davis</option>
      <option>Shauna Cone</option>
    </select><br><br>

    <button onclick="saveClient()">Save Client</button>
  </div>
</div>
<div id="listTab" class="tabSection">
  <div class="card">
    <h3>Client List</h3>
    <table id="clientTable" style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th>Client</th>
          <th>Navigator</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="clientTableBody"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDecMHTDApBmGLVpS9AmyiRkQhShmUZ6dE",
  authDomain: "cchc-1115-tracker.firebaseapp.com",
  projectId: "cchc-1115-tracker",
  storageBucket: "cchc-1115-tracker.firebasestorage.app",
  messagingSenderId: "865542493195",
  appId: "1:865542493195:web:ef8e16e1449d35b4f1630e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(err){
    document.getElementById("loginError").innerText = err.message;
  }
};

window.logout = function(){ signOut(auth); };

onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("appSection").classList.remove("hidden");
    document.getElementById("roleDisplay").innerText =
      "Logged in as: " + user.email;
    loadClients();
    showTab('dashboardTab');
  }else{
    document.getElementById("loginSection").classList.remove("hidden");
    document.getElementById("appSection").classList.add("hidden");
  }
});

window.showTab = function(tabId){

  document.querySelectorAll(".tabSection")
    .forEach(s => s.classList.remove("active"));

  const selectedTab = document.getElementById(tabId);

  if(selectedTab){
    selectedTab.classList.add("active");
  }

};

function loadClients(){
  const tableBody = document.getElementById("clientTableBody");
  const navCounts = {};

  onSnapshot(collection(db,"clients"), (snapshot)=>{
    tableBody.innerHTML = "";

    snapshot.forEach((doc)=>{
      const data = doc.data();

      navCounts[data.navigator] =
        (navCounts[data.navigator] || 0) + 1;

      tableBody.innerHTML += `
        <tr>
          <td>${data.client || ""}</td>
          <td>${data.navigator || ""}</td>
          <td>${data.status || ""}</td>
        </tr>
      `;
    });

    const ctx = document.getElementById("navChart");
    if(window.navChartInstance){
      window.navChartInstance.destroy();
    }

    window.navChartInstance = new Chart(ctx,{
      type:"bar",
      data:{
        labels:Object.keys(navCounts),
        datasets:[{
          label:"Clients per Navigator",
          data:Object.values(navCounts)
        }]
      },
      options:{ responsive:true }
    });

  });
}
</script>
</body>
</html>
