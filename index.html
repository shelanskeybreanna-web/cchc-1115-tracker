<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CCHC 1115 Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#071326;
  color:white;
}
header{
  background:#0f1f3a;
  padding:15px;
  font-size:20px;
  text-align:center;
  font-weight:bold;
}
.container{ padding:20px; }
.hidden{ display:none; }
.card{
  background:#0f1f3a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
button{
  padding:8px;
  border-radius:10px;
  border:none;
  background:#1e6fd9;
  color:white;
  cursor:pointer;
}
.tabSection{ display:none; }
.tabSection.active{ display:block; }

#clientTable th,#clientTable td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
  .section-divider {
  margin: 25px 0;
  border-top: 1px solid rgba(255,255,255,0.15);
}

.entry-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.entry-full {
  grid-column: span 2;
}

.service-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}

.service-row input[type="number"] {
  width: 140px;
  padding: 6px;
  border-radius: 6px;
}
input, select {
  background: #0f1f3a;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}
.total-box {
  background: rgba(30,111,217,0.15);
  padding: 10px 15px;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}

.grand-box {
  background: linear-gradient(90deg, rgba(30,111,217,0.3), rgba(0,150,255,0.3));
  padding: 14px 18px;
  border-radius: 12px;
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>
<body>

<header>CCHC 1115 Waiver Performance Tracker</header>

<div class="container">

<div id="loginSection" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="appSection" class="hidden">

<div style="margin-bottom:20px;">
  <button onclick="showTab('dashboardTab')">Dashboard</button>
  <button onclick="showTab('entryTab')">Client Entry</button>
  <button onclick="showTab('listTab')">Client List</button>
</div>


<div class="card">
  <button onclick="logout()">Logout</button>
  <h3 id="roleDisplay"></h3>
</div>

<div id="dashboardTab" class="tabSection">
  <div class="card">
    <h3>Dashboard</h3>
    <canvas id="navChart"></canvas>
  </div>
</div>

<div id="entryTab" class="tabSection">
  <div class="card">
    <h3>Client Entry</h3>

  <div class="entry-grid">

  <!-- LEFT COLUMN -->
  <div>
    <label>Client Name</label>
    <input id="clientName" style="width:100%;padding:8px;">
  </div>

  <div>
    <label>Status</label>
    <select id="status" style="width:100%;padding:8px;">
      <option>Open</option>
      <option>Closed</option>
    </select>
  </div>

  <div>
    <label>Navigator</label>
    <select id="navigator" style="width:100%;padding:8px;">
      <option>Breanna Shelanskey</option>
      <option>Kylie Miles</option>
      <option>Alexandra Dieffenbacher</option>
      <option>Laurie Davis</option>
      <option>Shauna Cone</option>
    </select>
  </div>
<div>
  <label>Medicaid Type</label>
  <select id="medicaid" style="width:100%;padding:8px;">
    <option>MCO</option>
    <option>Fee for Service</option>
    <option>Not in Enhanced Population</option>
    <option>No Needs</option>
  </select>
</div>

<div>
  <label>Medicaid Level</label>
  <select id="medicaidLevel" style="width:100%;padding:8px;">
    <option value="">Select Level</option>
    <option>Level 1 MCO</option>
    <option>Level 2 MCO</option>
    <option>Level 1 FFS</option>
    <option>Level 2 FFS</option>
  </select>
</div>

<div>
  <label>Eligibility Date</label>
  <input type="date" id="eligibilityDate" style="width:100%;padding:8px;">
</div>

<div>
  <label>Follow Up Date</label>
  <input type="date" id="followUpDate" style="width:100%;padding:8px;">
</div>
  <div>
    <label>Eligibility Units</label>
    <input type="number" id="eligibilityUnits" oninput="calculateTotals()" style="width:100%;padding:8px;">
    <div id="eligibilityTotal">$0.00</div>
  </div>

  <div>
    <label>Service Units</label>
    <input type="number" id="serviceUnits" oninput="calculateTotals()" style="width:100%;padding:8px;">
    <div id="serviceTotal">$0.00</div>
  </div>

  <!-- FULL WIDTH TOTAL -->
  <div class="entry-full">
    <div class="total-box">
      Navigation Total: <span id="navigationTotal">$0.00</span>
    </div>
  </div>

  <!-- SUPPORT SERVICES FULL WIDTH -->
  <div class="entry-full">
    <h4>Support Services</h4>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Rent"> Rent</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Utilities"> Utilities</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Microwave"> Microwave</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Fridge"> Fridge</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Pre-Tenancy"> Pre-Tenancy</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Nutrition"> Nutrition</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="service-row">
      <div><input type="checkbox" class="svcCheck" value="Follow Up"> Follow Up</div>
      <input type="number" class="svcAmount" oninput="calculateTotals()">
    </div>

    <div class="total-box">
      Support Total: <span id="supportTotal">$0.00</span>
    </div>

    <div class="grand-box">
      Grand Total: <span id="grandTotal">$0.00</span>
    </div>
  </div>

</div>

    <button onclick="saveClient()">Save Client</button>

  </div>
</div>

<div id="listTab" class="tabSection">
  <div class="card">
    <h3>Client List</h3>
    <table id="clientTable" style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th>Client</th>
          <th>Navigator</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="clientTableBody"></tbody>
    </table>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  onSnapshot,
  addDoc 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDecMHTDApBmGLVpS9AmyiRkQhShmUZ6dE",
  authDomain: "cchc-1115-tracker.firebaseapp.com",
  projectId: "cchc-1115-tracker",
  storageBucket: "cchc-1115-tracker.firebasestorage.app",
  messagingSenderId: "865542493195",
  appId: "1:865542493195:web:ef8e16e1449d35b4f1630e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

  window.calculateTotals = function(){

  const rate = 17.50;

  const eligibilityUnits = Number(document.getElementById("eligibilityUnits").value || 0);
  const serviceUnits = Number(document.getElementById("serviceUnits").value || 0);

  const eligibilityAmount = eligibilityUnits * rate;
  const serviceAmount = serviceUnits * rate;

  const navigationTotal = eligibilityAmount + serviceAmount;

  let supportTotal = 0;

  document.querySelectorAll(".svcAmount").forEach(input=>{
    supportTotal += Number(input.value || 0);
  });

  const grandTotal = navigationTotal + supportTotal;

  document.getElementById("eligibilityTotal").innerText = "$" + eligibilityAmount.toFixed(2);
  document.getElementById("serviceTotal").innerText = "$" + serviceAmount.toFixed(2);
  document.getElementById("navigationTotal").innerText = "$" + navigationTotal.toFixed(2);
  document.getElementById("supportTotal").innerText = "$" + supportTotal.toFixed(2);
  document.getElementById("grandTotal").innerText = "$" + grandTotal.toFixed(2);
};
 
window.saveClient = async function(){

  const clientName = document.getElementById("clientName").value;
  const status = document.getElementById("status").value;
  const navigator = document.getElementById("navigator").value;
  const eligibilityUnits = Number(document.getElementById("eligibilityUnits").value || 0);
  const serviceUnits = Number(document.getElementById("serviceUnits").value || 0);

  if(!clientName){
    alert("Please enter a client name.");
    return;
  }

  try {
    await addDoc(collection(db,"clients"),{
      client: clientName,
      status: status,
      navigator: navigator,
      eligibilityUnits: eligibilityUnits,
      serviceUnits: serviceUnits,
      createdAt: new Date()
    });

    alert("Client saved successfully!");

    document.getElementById("clientName").value = "";
    document.getElementById("status").value = "Open";
    document.getElementById("navigator").selectedIndex = 0;
    document.getElementById("eligibilityUnits").value = "";
    document.getElementById("serviceUnits").value = "";

  } catch(err){
    console.error("Save error:", err);
    alert("Error saving client. Check console.");
  }
};
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(err){
    document.getElementById("loginError").innerText = err.message;
  }
};

window.logout = function(){ signOut(auth); };

onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("appSection").classList.remove("hidden");
    document.getElementById("roleDisplay").innerText =
      "Logged in as: " + user.email;
    loadClients();
    showTab('dashboardTab');
  }else{
    document.getElementById("loginSection").classList.remove("hidden");
    document.getElementById("appSection").classList.add("hidden");
  }
});

window.showTab = function(tabId){

  document.querySelectorAll(".tabSection")
    .forEach(s => s.classList.remove("active"));

  const selectedTab = document.getElementById(tabId);

  if(selectedTab){
    selectedTab.classList.add("active");
  }

};

function loadClients(){
  const tableBody = document.getElementById("clientTableBody");
  const navCounts = {};

  onSnapshot(collection(db,"clients"), (snapshot)=>{
    tableBody.innerHTML = "";

    snapshot.forEach((doc)=>{
      const data = doc.data();

      navCounts[data.navigator] =
        (navCounts[data.navigator] || 0) + 1;

      tableBody.innerHTML += `
        <tr>
          <td>${data.client || ""}</td>
          <td>${data.navigator || ""}</td>
          <td>${data.status || ""}</td>
        </tr>
      `;
    });

    const ctx = document.getElementById("navChart");
    if(window.navChartInstance){
      window.navChartInstance.destroy();
    }

    window.navChartInstance = new Chart(ctx,{
      type:"bar",
      data:{
        labels:Object.keys(navCounts),
        datasets:[{
          label:"Clients per Navigator",
          data:Object.values(navCounts)
        }]
      },
      options:{ responsive:true }
    });

  });
}
</script>
</body>
</html>
